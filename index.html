<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mosad Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#d4af37;--gold2:#f1c40f;--dark:#080808;--card:#111;--green:#2ecc71;--red:#e74c3c;--blue:#3498db}
body{background:var(--dark);color:#fff;font-family:Tahoma,Arial,sans-serif;min-height:100vh}
.screen{display:none;min-height:100vh;padding-bottom:40px}
.screen.active{display:block}

.top-bar{padding:22px 20px 6px;text-align:center}
.logo{font-size:1.5rem;font-weight:900;display:inline-block;padding:10px 18px}
.logo b{color:var(--gold)}
.status-line{font-size:0.7rem;color:#666;text-align:center;margin-bottom:6px;min-height:14px}
.status-line.ok{color:var(--green)}
.status-line.bad{color:var(--red)}

.section-title{font-size:0.85rem;color:#666;margin:14px 0;text-align:center;font-weight:600}
.chairs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 20px}
.chair-card{background:var(--card);border:1px solid #1e1e1e;border-radius:20px;padding:30px 16px;text-align:center}
.chair-card:active{opacity:0.7}
.chair-emoji{font-size:2.2rem;margin-bottom:10px}
.chair-name{font-size:1.05rem;font-weight:700;color:#ddd}

.attend-btn-wrap{padding:18px 20px 4px}
.attend-btn{width:100%;padding:16px;background:linear-gradient(135deg,#1a3a52,#2980b9);
  border:none;border-radius:16px;color:#fff;font-size:0.95rem;font-weight:800;
  font-family:Tahoma,Arial,sans-serif}
.attend-btn:active{opacity:0.8}

.work-header{padding:14px 20px 18px;text-align:center}
.active-chair-name{font-size:1.7rem;font-weight:900;color:var(--gold)}
.today-badge{display:inline-flex;align-items:center;gap:8px;
  background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);
  border-radius:50px;padding:8px 20px;margin-top:10px}
.today-badge .val{font-size:1.4rem;font-weight:900;color:var(--green)}
.today-badge .lbl{font-size:0.75rem;color:#888}

.form-card{background:var(--card);border:1px solid #1a1a1a;border-radius:20px;margin:0 16px;padding:20px}
.field-label{font-size:0.78rem;color:#888;font-weight:600;margin-bottom:6px;display:block}
.field-input{width:100%;background:#000;border:1.5px solid #1e1e1e;border-radius:12px;
  color:#fff;padding:14px 16px;font-size:1rem;font-family:Tahoma,Arial,sans-serif;
  text-align:right;margin-bottom:12px}
.field-input:focus{outline:none;border-color:var(--gold)}
.btn-main{width:100%;padding:16px;background:var(--gold2);border:none;border-radius:14px;
  font-size:1rem;font-weight:900;color:#000;font-family:Tahoma,Arial,sans-serif;margin-top:4px}
.btn-main:active{opacity:0.8}
.btn-main:disabled{opacity:0.4}
.btn-ghost{width:100%;padding:13px;background:transparent;border:1px solid #1a1a1a;
  border-radius:12px;color:#777;font-family:Tahoma,Arial,sans-serif;font-size:0.85rem;margin-top:10px}
.btn-ghost:active{opacity:0.6}
.btn-danger{color:var(--red);border-color:rgba(231,76,60,0.3)}

/* ADMIN TABS */
.tab-bar{display:flex;gap:8px;margin:0 16px 14px;background:#0c0c0c;border-radius:14px;padding:5px;border:1px solid #1a1a1a}
.tab-btn{flex:1;padding:11px 6px;border:none;background:transparent;color:#666;border-radius:10px;
  font-family:Tahoma,Arial,sans-serif;font-size:0.85rem;font-weight:700}
.tab-btn.active{background:var(--gold2);color:#000}
.tab-content{display:none}
.tab-content.active{display:block}

/* RANGE SELECTOR */
.range-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.range-btn{padding:8px 12px;border-radius:50px;border:1px solid #222;background:#0c0c0c;
  color:#888;font-size:0.75rem;font-family:Tahoma,Arial,sans-serif;font-weight:700}
.range-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}
.date-pick-row{display:flex;gap:8px;margin-bottom:14px}
.date-pick-row input{flex:1}
.date-pick-row button{width:auto;padding:14px 18px}

.range-label{font-size:0.78rem;color:#777;text-align:center;margin-bottom:10px}
.stat-box{background:#161616;padding:14px;border-radius:14px;border:1px solid #222;margin-bottom:12px}
.stat-box .num{font-size:1.3rem;font-weight:700;color:var(--gold)}
.log-list{max-height:300px;overflow-y:auto;background:#050505;border-radius:14px;padding:6px;border:1px solid #1a1a1a}
.log-item{font-size:0.78rem;padding:9px 6px;border-bottom:1px solid #111;display:flex;gap:6px;color:#aaa}
.log-item span{flex:1}
.date-header{font-size:0.75rem;color:var(--gold);font-weight:800;padding:10px 6px 4px;background:#0a0a0a;
  position:sticky;top:0}
.empty-note{text-align:center;padding:16px;color:#444;font-size:0.85rem}
.count-note{font-size:0.7rem;color:#555;text-align:center;margin-top:8px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:12px 22px;
  border-radius:50px;font-size:0.85rem;z-index:200;opacity:0;transition:0.25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(46,204,113,0.4);color:var(--green)}
.toast.error{border-color:rgba(231,76,60,0.4);color:var(--red)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid #222;border-radius:18px;padding:22px;width:100%;max-width:320px}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:12px;text-align:center}
.modal-msg{font-size:0.85rem;color:#999;margin-bottom:14px;text-align:center;line-height:1.5}
.modal-box .field-input{margin-bottom:10px}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.modal-actions button{flex:1}
</style>
</head>
<body>

<div class="screen active" id="s-login">
  <div class="top-bar"><div class="logo" id="logo-tap">Mosad <b>Studio</b></div></div>
  <div class="status-line" id="status-line">جاري الفحص...</div>
  <div class="section-title">اختر الكرسي</div>
  <div class="chairs-grid">
    <div class="chair-card" id="chair1-btn"><div class="chair-emoji">💺</div><div class="chair-name">كرسي 1</div></div>
    <div class="chair-card" id="chair2-btn"><div class="chair-emoji">💺</div><div class="chair-name">كرسي 2</div></div>
    <div class="chair-card" id="chair3-btn"><div class="chair-emoji">💺</div><div class="chair-name">كرسي 3</div></div>
  </div>
  <div class="attend-btn-wrap">
    <button class="attend-btn" id="attend-btn">📍 تسجيل الحضور</button>
  </div>
</div>

<div class="screen" id="s-work">
  <div class="top-bar"><div class="logo">Mosad <b>Studio</b></div></div>
  <div class="work-header">
    <div class="active-chair-name" id="w-name">كرسي 1</div>
    <div class="today-badge">
      <span class="val" id="w-today">0</span>
      <span class="lbl">ج.م — إيراد اليوم (هذا الكرسي)</span>
    </div>
  </div>
  <div class="form-card">
    <span class="field-label">اسم العميل (اختياري)</span>
    <input class="field-input" id="f-name" type="text" placeholder="اكتب هنا...">
    <span class="field-label">المبلغ</span>
    <input class="field-input" id="f-amt" type="number" inputmode="decimal" placeholder="0">
    <button class="btn-main" id="save-btn">تسجيل العملية 💸</button>
    <button class="btn-ghost" id="back-btn-1">↩️ رجوع</button>
  </div>
</div>

<div class="screen" id="s-admin">
  <div class="top-bar"><div class="logo">لوحة <b>الإدارة</b></div></div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-revenue-btn">💰 الإيرادات</button>
    <button class="tab-btn" id="tab-attend-btn">📍 الحضور</button>
  </div>

  <div class="tab-content active" id="tab-revenue">
    <div class="form-card">
      <div class="range-bar">
        <button class="range-btn active" data-range="today">اليوم</button>
        <button class="range-btn" data-range="week">الأسبوع</button>
        <button class="range-btn" data-range="month">الشهر</button>
        <button class="range-btn" data-range="year">السنة</button>
        <button class="range-btn" data-range="all">من أول يوم</button>
      </div>
      <div class="date-pick-row">
        <input class="field-input" type="date" id="custom-date" style="margin-bottom:0;">
        <button class="btn-main" id="custom-date-btn" style="margin-top:0;">عرض</button>
      </div>
      <div class="range-label" id="range-label">إيراد اليوم</div>

      <div class="stat-box">الإجمالي: <span id="adm-total" class="num">0</span> ج.م</div>
      <div style="font-size:0.8rem;color:#888;margin-bottom:8px;">تفصيل الكراسي:</div>
      <div id="adm-chairs-breakdown" style="font-size:0.85rem;line-height:1.8;margin-bottom:14px;"></div>

      <span class="field-label">العمليات:</span>
      <div class="log-list" id="adm-log"></div>
      <div class="count-note" id="adm-count-note"></div>

      <hr style="border:0;border-top:1px solid #222;margin:18px 0;">
      <button class="btn-ghost" id="change-pass-btn">🔐 تغيير كلمة المرور</button>
      <button class="btn-ghost btn-danger" id="clear-db-btn">🗑️ تصفير الإيرادات فقط</button>
    </div>
  </div>

  <div class="tab-content" id="tab-attend">
    <div class="form-card">
      <div class="stat-box">إجمالي مرات تسجيل الحضور: <span id="attend-count" class="num">0</span></div>
      <span class="field-label">سجل الحضور (من أول يوم — دائم، غير قابل للحذف):</span>
      <div class="log-list" id="attend-log" style="max-height:420px;"></div>
    </div>
  </div>

  <div class="form-card" style="margin-top:10px;">
    <button class="btn-main" id="back-btn-2">↩️ العودة للرئيسية</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal-box" id="modal-box"></div></div>

<script>
(function(){

var STORAGE_OK = (typeof window.storage !== 'undefined' && window.storage !== null);
var DEFAULT_PASS = '1234';
var activeChair = '';
var pollTimer = null;
var localEntries = [];
var localAttendance = [];
var localPass = DEFAULT_PASS;
var currentRange = 'today';
var currentCustomDate = null;

var AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function $(id){ return document.getElementById(id); }

function showScreen(id){
  var all = document.querySelectorAll('.screen');
  for(var i=0;i<all.length;i++){ all[i].classList.remove('active'); }
  $(id).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(msg, type){
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function isToday(ts){
  var d = new Date(); d.setHours(0,0,0,0);
  return ts >= d.getTime();
}

function fmtDate(ts){
  var d = new Date(ts);
  return d.getDate() + ' ' + AR_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function fmtTime(ts){
  var d = new Date(ts);
  var hh = d.getHours(), mm = d.getMinutes();
  return hh + ':' + (mm < 10 ? '0' : '') + mm;
}

function dayKey(ts){
  var d = new Date(ts); d.setHours(0,0,0,0);
  return d.getTime();
}

/* ---------- modal ---------- */
function askInput(title, msg, placeholder, isPassword){
  return new Promise(function(resolve){
    var box = $('modal-box');
    box.innerHTML =
      '<div class="modal-title">' + title + '</div>' +
      (msg ? '<div class="modal-msg">' + msg + '</div>' : '') +
      '<input class="field-input" id="modal-input" type="' + (isPassword ? 'password' : 'text') + '" placeholder="' + (placeholder || '') + '">' +
      '<div class="modal-actions">' +
        '<button class="btn-ghost" id="modal-cancel">إلغاء</button>' +
        '<button class="btn-main" id="modal-ok">تأكيد</button>' +
      '</div>';
    $('modal-overlay').classList.add('show');
    var input = $('modal-input');
    setTimeout(function(){ input.focus(); }, 80);
    function close(val){ $('modal-overlay').classList.remove('show'); resolve(val); }
    $('modal-ok').onclick = function(){ close(input.value); };
    $('modal-cancel').onclick = function(){ close(null); };
    input.onkeydown = function(e){ if(e.key === 'Enter'){ close(input.value); } };
  });
}

function askConfirm(title, msg){
  return new Promise(function(resolve){
    var box = $('modal-box');
    box.innerHTML =
      '<div class="modal-title">' + title + '</div>' +
      '<div class="modal-msg">' + msg + '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn-ghost" id="modal-cancel">إلغاء</button>' +
        '<button class="btn-main" id="modal-ok" style="background:rgba(231,76,60,0.15);color:var(--red);">تأكيد</button>' +
      '</div>';
    $('modal-overlay').classList.add('show');
    $('modal-ok').onclick = function(){ $('modal-overlay').classList.remove('show'); resolve(true); };
    $('modal-cancel').onclick = function(){ $('modal-overlay').classList.remove('show'); resolve(false); };
  });
}

/* ---------- data layer ---------- */
function randKey(prefix){ return prefix + Date.now() + '-' + Math.random().toString(36).slice(2,8); }

async function getAllEntries(){
  if(!STORAGE_OK) return localEntries.slice();
  try{
    var list = await window.storage.list('entry:', true);
    if(!list || !list.keys || list.keys.length === 0) return [];
    var out = [];
    for(var i=0;i<list.keys.length;i++){
      try{ var r = await window.storage.get(list.keys[i], true); if(r && r.value){ out.push(JSON.parse(r.value)); } }catch(e){}
    }
    return out;
  }catch(e){ return localEntries.slice(); }
}

async function addEntry(entry){
  if(!STORAGE_OK){ localEntries.push(entry); return true; }
  try{ return !!(await window.storage.set(randKey('entry:'), JSON.stringify(entry), true)); }
  catch(e){ localEntries.push(entry); return true; }
}

async function getAllAttendance(){
  if(!STORAGE_OK) return localAttendance.slice();
  try{
    var list = await window.storage.list('attend:', true);
    if(!list || !list.keys || list.keys.length === 0) return [];
    var out = [];
    for(var i=0;i<list.keys.length;i++){
      try{ var r = await window.storage.get(list.keys[i], true); if(r && r.value){ out.push(JSON.parse(r.value)); } }catch(e){}
    }
    return out;
  }catch(e){ return localAttendance.slice(); }
}

async function addAttendance(rec){
  if(!STORAGE_OK){ localAttendance.push(rec); return true; }
  try{ return !!(await window.storage.set(randKey('attend:'), JSON.stringify(rec), true)); }
  catch(e){ localAttendance.push(rec); return true; }
}

async function getPass(){
  if(!STORAGE_OK) return localPass;
  try{ var r = await window.storage.get('admin-pass', true); return (r && r.value) ? r.value : DEFAULT_PASS; }
  catch(e){ return localPass; }
}

async function setPass(p){
  if(!STORAGE_OK){ localPass = p; return; }
  try{ await window.storage.set('admin-pass', p, true); } catch(e){ localPass = p; }
}

async function clearAllEntries(){
  if(!STORAGE_OK){ localEntries = []; return; }
  try{
    var list = await window.storage.list('entry:', true);
    if(list && list.keys){ for(var i=0;i<list.keys.length;i++){ try{ await window.storage.delete(list.keys[i], true); }catch(e){} } }
  }catch(e){ localEntries = []; }
}

/* ---------- chair work screen ---------- */
function enterChair(chair){
  activeChair = chair;
  $('w-name').textContent = chair;
  $('f-name').value = '';
  $('f-amt').value = '';
  showScreen('s-work');
  refreshTotal();
  clearInterval(pollTimer);
  pollTimer = setInterval(refreshTotal, 5000);
  setTimeout(function(){ $('f-amt').focus(); }, 250);
}

async function refreshTotal(){
  var entries = await getAllEntries();
  var sum = 0;
  for(var i=0;i<entries.length;i++){
    var r = entries[i];
    if(r.chair === activeChair && isToday(r.time)) sum += r.price;
  }
  $('w-today').textContent = sum;
}

async function saveEntry(){
  var amt = parseFloat($('f-amt').value);
  var name = $('f-name').value.trim();
  if(!amt || amt <= 0){ showToast('⚠️ اكتب المبلغ صح!', 'error'); return; }
  var btn = $('save-btn');
  btn.disabled = true;
  var entry = { chair: activeChair, customer: name || 'زبون', price: amt, time: Date.now() };
  var ok = await addEntry(entry);
  btn.disabled = false;
  if(!ok){ showToast('❌ حصل خطأ، حاول تاني', 'error'); return; }
  $('f-amt').value = '';
  $('f-name').value = '';
  await refreshTotal();
  showToast('✅ اتسجلت بنجاح!', 'success');
  setTimeout(function(){ $('f-amt').focus(); }, 250);
}

/* ---------- attendance (check-in) ---------- */
async function doAttendance(){
  var name = await askInput('📍 تسجيل الحضور', 'اكتب اسمك', 'اسمك');
  if(name === null) return;
  name = name.trim();
  if(!name){ showToast('⚠️ اكتب اسمك أولاً', 'error'); return; }
  var rec = { worker: name, time: Date.now() };
  var ok = await addAttendance(rec);
  if(ok){
    showToast('✅ تم تسجيل حضورك يا ' + name + ' — ' + fmtTime(rec.time), 'success');
  } else {
    showToast('❌ حصل خطأ، حاول تاني', 'error');
  }
}

/* ---------- admin: revenue range filtering ---------- */
function getRangeBounds(range){
  var now = new Date();
  if(range === 'today'){
    var d = new Date(); d.setHours(0,0,0,0);
    return [d.getTime(), Infinity];
  }
  if(range === 'week'){
    var d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - d.getDay());
    return [d.getTime(), Infinity];
  }
  if(range === 'month'){
    var d = new Date(); d.setDate(1); d.setHours(0,0,0,0);
    return [d.getTime(), Infinity];
  }
  if(range === 'year'){
    var d = new Date(); d.setMonth(0,1); d.setHours(0,0,0,0);
    return [d.getTime(), Infinity];
  }
  return [0, Infinity]; // all
}

function rangeLabelText(range){
  if(range === 'today') return 'إيراد اليوم';
  if(range === 'week') return 'إيراد هذا الأسبوع';
  if(range === 'month') return 'إيراد هذا الشهر';
  if(range === 'year') return 'إيراد هذه السنة';
  if(range === 'all') return 'الإيراد الكلي من أول يوم';
  return '';
}

async function loadAdminPanel(){
  var entries = await getAllEntries();
  var lo, hi, label;

  if(currentCustomDate){
    var d = new Date(currentCustomDate + 'T00:00:00');
    lo = d.getTime();
    hi = lo + 24*60*60*1000;
    label = 'إيراد يوم ' + fmtDate(lo);
  } else {
    var b = getRangeBounds(currentRange);
    lo = b[0]; hi = b[1];
    label = rangeLabelText(currentRange);
  }

  var filtered = [];
  for(var i=0;i<entries.length;i++){
    if(entries[i].time >= lo && entries[i].time < hi) filtered.push(entries[i]);
  }

  var total = 0;
  var sums = { 'الكرسي 1': 0, 'الكرسي 2': 0, 'الكرسي 3': 0 };
  for(var j=0;j<filtered.length;j++){
    total += filtered[j].price;
    if(sums[filtered[j].chair] !== undefined) sums[filtered[j].chair] += filtered[j].price;
  }

  $('range-label').textContent = label;
  $('adm-total').textContent = total;
  $('adm-chairs-breakdown').innerHTML =
    '🔹 كرسي 1: ' + sums['الكرسي 1'] + ' ج.م<br>' +
    '🔹 كرسي 2: ' + sums['الكرسي 2'] + ' ج.م<br>' +
    '🔹 كرسي 3: ' + sums['الكرسي 3'] + ' ج.م';

  filtered.sort(function(a,b){ return b.time - a.time; });
  var shown = filtered.slice(0, 60);
  var html = '';
  if(shown.length === 0){
    html = '<div class="empty-note">لا توجد عمليات في هذه الفترة</div>';
  } else {
    var lastDay = null;
    for(var k=0;k<shown.length;k++){
      var r = shown[k];
      var dk = dayKey(r.time);
      if(dk !== lastDay){
        html += '<div class="date-header">' + fmtDate(r.time) + '</div>';
        lastDay = dk;
      }
      html += '<div class="log-item">' +
                '<span style="color:var(--gold);">' + r.chair + '</span>' +
                '<span>' + r.customer + '</span>' +
                '<span style="text-align:left;color:var(--green);">' + r.price + ' ج.م (' + fmtTime(r.time) + ')</span>' +
              '</div>';
    }
  }
  $('adm-log').innerHTML = html;
  $('adm-count-note').textContent = filtered.length > 60 ?
    ('إجمالي العمليات في هذه الفترة: ' + filtered.length + ' (آخر 60 معروضة)') :
    (filtered.length > 0 ? 'إجمالي العمليات: ' + filtered.length : '');
}

async function loadAttendancePanel(){
  var records = await getAllAttendance();
  $('attend-count').textContent = records.length;
  records.sort(function(a,b){ return b.time - a.time; });
  var html = '';
  if(records.length === 0){
    html = '<div class="empty-note">لا يوجد سجل حضور بعد</div>';
  } else {
    var lastDay = null;
    for(var i=0;i<records.length;i++){
      var r = records[i];
      var dk = dayKey(r.time);
      if(dk !== lastDay){
        html += '<div class="date-header">' + fmtDate(r.time) + '</div>';
        lastDay = dk;
      }
      html += '<div class="log-item">' +
                '<span style="color:var(--gold);">' + r.worker + '</span>' +
                '<span style="text-align:left;color:var(--blue);">' + fmtTime(r.time) + '</span>' +
              '</div>';
    }
  }
  $('attend-log').innerHTML = html;
}

/* ---------- admin access / settings ---------- */
async function checkAdminPass(){
  var p = await askInput('🔐 دخول الإدارة', '', 'كلمة المرور', true);
  if(p === null) return;
  var real = await getPass();
  if(p === real){
    showScreen('s-admin');
    currentRange = 'today';
    currentCustomDate = null;
    setActiveRangeButton('today');
    loadAdminPanel();
    loadAttendancePanel();
    clearInterval(pollTimer);
    pollTimer = setInterval(function(){ loadAdminPanel(); loadAttendancePanel(); }, 5000);
  } else {
    showToast('❌ كلمة المرور غير صحيحة', 'error');
  }
}

async function changeAdminPass(){
  var real = await getPass();
  var old = await askInput('🔐 تغيير كلمة المرور', 'أدخل كلمة المرور الحالية', 'كلمة المرور الحالية', true);
  if(old === null) return;
  if(old !== real){ showToast('❌ كلمة المرور الحالية خاطئة', 'error'); return; }
  var np = await askInput('🔐 كلمة مرور جديدة', '', 'كلمة المرور الجديدة', true);
  if(np === null) return;
  if(!np.trim()){ showToast('⚠️ كلمة المرور غير صالحة', 'error'); return; }
  await setPass(np.trim());
  showToast('🔐 تم تغيير كلمة المرور', 'success');
}

async function clearDatabase(){
  var ok = await askConfirm('⚠️ تأكيد التصفير', 'هل أنت متأكد من حذف جميع الإيرادات نهائياً؟ (سجل الحضور لن يتأثر)');
  if(!ok) return;
  await clearAllEntries();
  await loadAdminPanel();
  showToast('🗑️ تم تصفير الإيرادات', 'success');
}

function goBack(){
  activeChair = '';
  clearInterval(pollTimer);
  showScreen('s-login');
}

/* ---------- range buttons UI ---------- */
function setActiveRangeButton(range){
  var btns = document.querySelectorAll('.range-btn');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-range') === range); }
}

var rangeButtons = document.querySelectorAll('.range-btn');
for(var i=0;i<rangeButtons.length;i++){
  rangeButtons[i].addEventListener('click', function(){
    currentRange = this.getAttribute('data-range');
    currentCustomDate = null;
    $('custom-date').value = '';
    setActiveRangeButton(currentRange);
    loadAdminPanel();
  });
}

$('custom-date-btn').addEventListener('click', function(){
  var v = $('custom-date').value;
  if(!v){ showToast('⚠️ اختر تاريخ أولاً', 'error'); return; }
  currentCustomDate = v;
  setActiveRangeButton(null);
  loadAdminPanel();
});

/* ---------- admin tabs ---------- */
$('tab-revenue-btn').addEventListener('click', function(){
  $('tab-revenue-btn').classList.add('active');
  $('tab-attend-btn').classList.remove('active');
  $('tab-revenue').classList.add('active');
  $('tab-attend').classList.remove('active');
});
$('tab-attend-btn').addEventListener('click', function(){
  $('tab-attend-btn').classList.add('active');
  $('tab-revenue-btn').classList.remove('active');
  $('tab-attend').classList.add('active');
  $('tab-revenue').classList.remove('active');
});

/* ---------- secret admin access: tap logo 5x within 3s ---------- */
var tapCount = 0, tapTimer = null;
function onLogoTap(){
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(function(){ tapCount = 0; }, 3000);
  if(tapCount >= 5){ tapCount = 0; checkAdminPass(); }
}

/* ---------- wire up events ---------- */
$('logo-tap').addEventListener('click', onLogoTap);
$('chair1-btn').addEventListener('click', function(){ enterChair('الكرسي 1'); });
$('chair2-btn').addEventListener('click', function(){ enterChair('الكرسي 2'); });
$('chair3-btn').addEventListener('click', function(){ enterChair('الكرسي 3'); });
$('attend-btn').addEventListener('click', doAttendance);
$('save-btn').addEventListener('click', saveEntry);
$('back-btn-1').addEventListener('click', goBack);
$('back-btn-2').addEventListener('click', goBack);
$('change-pass-btn').addEventListener('click', changeAdminPass);
$('clear-db-btn').addEventListener('click', clearDatabase);
$('f-amt').addEventListener('keydown', function(e){ if(e.key === 'Enter') saveEntry(); });

/* ---------- status check ---------- */
var statusEl = $('status-line');
if(STORAGE_OK){
  statusEl.textContent = '🟢 المزامنة بين التليفونات شغالة';
  statusEl.className = 'status-line ok';
} else {
  statusEl.textContent = '🔴 المزامنة غير متاحة هنا — كل تليفون بياناته لوحده';
  statusEl.className = 'status-line bad';
}

})();
</script>
